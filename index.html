<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzaria Patrício</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--sidebar:#161b22;--card:#1c2333;--card2:#21262d;
  --border:#30363d;--red:#e63946;--red2:#c1121f;--green:#2ea043;
  --blue:#1f6feb;--orange:#fb8500;--purple:#8b5cf6;--text:#e6edf3;
  --muted:#8b949e;--yellow:#f0c000;
}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}

/* ===== LOGIN ===== */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0d1117 0%,#1c1f2e 50%,#1a0a0a 100%)}
.login-box{background:var(--card);border:1px solid var(--border);padding:44px 40px;border-radius:16px;width:380px;box-shadow:0 24px 64px rgba(0,0,0,.6);text-align:center}
.login-logo{width:64px;height:64px;background:var(--red);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px}
.login-box h1{font-size:22px;margin-bottom:4px}
.login-box p{font-size:13px;color:var(--muted);margin-bottom:28px}
.login-box input{width:100%;padding:11px 14px;margin-bottom:14px;background:#0d1117;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:.2s}
.login-box input:focus{border-color:var(--red)}
.login-box button{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.login-box button:hover{background:var(--red2)}
.login-error{color:var(--red);font-size:13px;margin-top:10px;display:none}

/* ===== APP LAYOUT ===== */
#app{display:none;height:100vh;flex-direction:column}
.app-header{height:56px;background:var(--sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:100}
.app-header .hamburger{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:.2s}
.app-header .hamburger:hover{background:var(--card2);color:var(--text)}
.app-header h2{font-size:18px;font-weight:600;flex:1}
.app-header .hactions{display:flex;align-items:center;gap:10px}
.app-header .hactions .icon-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:6px;border-radius:8px;transition:.2s;position:relative}
.app-header .hactions .icon-btn:hover{background:var(--card2);color:var(--text)}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--red);border-radius:50%}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:13px}
.user-chip .badge{background:var(--red);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.btn-logout{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;transition:.2s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

.app-body{display:flex;flex:1;overflow:hidden}

/* ===== SIDEBAR ===== */
#sidebar{width:220px;background:var(--sidebar);border-right:1px solid var(--border);padding:16px 0;display:flex;flex-direction:column;overflow-y:auto;transition:width .25s;flex-shrink:0}
#sidebar.collapsed{width:56px}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:0 16px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar-logo .logo-icon{width:36px;height:36px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sidebar-logo .logo-text{font-size:13px;line-height:1.3;overflow:hidden;white-space:nowrap}
.sidebar-logo .logo-text strong{display:block;font-size:14px}
.sidebar-logo .logo-text span{color:var(--muted);font-size:11px}
.nav-section{padding:0 12px;margin-bottom:4px}
.nav-section-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;padding:8px 8px 4px;overflow:hidden;white-space:nowrap}
#sidebar.collapsed .nav-section-label{opacity:0}
.nav-btn{width:100%;background:none;border:none;color:var(--muted);text-align:left;padding:9px 10px;cursor:pointer;font-size:13px;border-radius:8px;display:flex;align-items:center;gap:10px;transition:.15s;white-space:nowrap;overflow:hidden;position:relative}
.nav-btn:hover{background:var(--card2);color:var(--text)}
.nav-btn.active{background:rgba(230,57,70,.15);color:var(--red);font-weight:600}
.nav-btn .nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.nav-btn .nav-label{overflow:hidden}
#sidebar.collapsed .nav-label{display:none}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;flex-shrink:0}
#sidebar.collapsed .nav-badge{display:none}

/* ===== MAIN ===== */
#main-content{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
.page{display:none}
.page.active{display:block}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.page-header h2{font-size:22px;font-weight:700}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:22px}

/* ===== CARDS ===== */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:16px;transition:.2s}
.metric-card:hover{border-color:#444;transform:translateY(-1px)}
.metric-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.metric-card .metric-val{font-size:24px;font-weight:700;line-height:1.1}
.metric-card .metric-label{font-size:12px;color:var(--muted);margin-top:2px}
.metric-card .metric-sub{font-size:11px;margin-top:3px}

/* ===== CHARTS ===== */
.chart-row{display:grid;grid-template-columns:1fr 380px;gap:16px;margin-bottom:20px}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-box h3{font-size:15px;margin-bottom:16px}
.ranking-list{display:flex;flex-direction:column;gap:10px}
.rank-item{display:flex;align-items:center;gap:10px}
.rank-num{width:24px;height:24px;border-radius:50%;background:var(--red);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-num.gold{background:#f0c000;color:#000}
.rank-num.silver{background:#8b949e}
.rank-num.bronze{background:#fb8500}
.rank-bar-wrap{flex:1}
.rank-name{font-size:13px;margin-bottom:3px}
.rank-bar{height:6px;background:var(--red);border-radius:3px;opacity:.8}
.rank-count{font-size:12px;color:var(--muted);flex-shrink:0}

/* ===== TABLES ===== */
.table-box{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:var(--card2);padding:11px 16px;text-align:left;font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

/* ===== BUTTONS ===== */
.btn{padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:var(--red2)}
.btn-green{background:var(--green);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-gray{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-gray:hover{background:#2d333b}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}

/* ===== FORMS ===== */
.form-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.form-row{margin-bottom:16px}
.form-row label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:10px 12px;background:#0d1117;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:.2s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--red)}
.form-row select option{background:var(--card)}
.form-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ===== STATUS ===== */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;gap:4px}
.badge-pending{background:rgba(240,192,0,.15);color:var(--yellow);border:1px solid rgba(240,192,0,.3)}
.badge-making{background:rgba(31,111,235,.15);color:#58a6ff;border:1px solid rgba(31,111,235,.3)}
.badge-delivery{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
.badge-done{background:rgba(46,160,67,.15);color:#3fb950;border:1px solid rgba(46,160,67,.3)}
.badge-cancelled{background:rgba(230,57,70,.15);color:var(--red);border:1px solid rgba(230,57,70,.3)}
.badge-active{background:rgba(46,160,67,.15);color:#3fb950;border:1px solid rgba(46,160,67,.3)}
.badge-inactive{background:rgba(139,148,158,.15);color:var(--muted);border:1px solid rgba(139,148,158,.2)}
.badge-dine{background:rgba(251,133,0,.15);color:var(--orange);border:1px solid rgba(251,133,0,.3)}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.modal-lg{width:700px}

/* ===== PDV ===== */
.pdv-layout{display:grid;grid-template-columns:1fr 360px;gap:16px;min-height:calc(100vh - 160px)}
.pdv-products{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.pdv-cart{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;flex-direction:column}
.product-search{width:100%;padding:10px 14px;background:#0d1117;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;margin-bottom:14px}
.product-search:focus{border-color:var(--red)}
.cat-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.cat-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.cat-tab.active,.cat-tab:hover{background:var(--red);color:#fff;border-color:var(--red)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.product-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px 12px;cursor:pointer;transition:.15s;text-align:center}
.product-card:hover{border-color:var(--red);transform:translateY(-2px)}
.product-card .pc-icon{font-size:28px;margin-bottom:6px}
.product-card .pc-name{font-size:13px;font-weight:600;margin-bottom:4px}
.product-card .pc-price{font-size:12px;color:var(--red)}
.product-card .pc-sizes{font-size:10px;color:var(--muted);margin-top:2px}

.cart-items{flex:1;overflow-y:auto;margin-bottom:14px}
.cart-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13px;font-weight:600}
.cart-item-sub{font-size:11px;color:var(--muted);margin-top:1px}
.cart-item-price{font-size:13px;font-weight:700;color:var(--red);flex-shrink:0}
.cart-item-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;transition:.15s}
.cart-item-remove:hover{color:var(--red);background:rgba(230,57,70,.1)}
.cart-total-box{border-top:1px solid var(--border);padding-top:14px}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:14px}
.cart-total-row.big{font-size:18px;font-weight:700;color:var(--text)}
.cart-obs{width:100%;padding:8px 10px;background:#0d1117;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;resize:none;margin-bottom:12px}
.payment-select{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.pay-btn{padding:8px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--muted);font-size:12px;cursor:pointer;transition:.15s;font-weight:600}
.pay-btn.active,.pay-btn:hover{border-color:var(--green);color:var(--green);background:rgba(46,160,67,.1)}

/* ===== KITCHEN ===== */
.kitchen-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.kitchen-col-title{font-size:13px;font-weight:700;margin-bottom:10px;padding:8px 12px;border-radius:8px;text-align:center}
.kc-pending{background:rgba(240,192,0,.1);color:var(--yellow)}
.kc-making{background:rgba(31,111,235,.1);color:#58a6ff}
.kc-ready{background:rgba(46,160,67,.1);color:#3fb950}
.kitchen-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.kitchen-card.urgent{border-color:var(--red);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(230,57,70,.3)}50%{box-shadow:0 0 0 6px rgba(230,57,70,0)}}
.kitchen-card h4{font-size:14px;font-weight:700;margin-bottom:6px;display:flex;justify-content:space-between}
.kitchen-card .kc-items{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:10px}
.kitchen-card .kc-time{font-size:11px;color:var(--muted);margin-bottom:8px}

/* ===== SIZES CONFIG ===== */
.size-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:10px;background:#0d1117;border-radius:8px;border:1px solid var(--border)}
.size-row input{flex:1;padding:6px 10px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}
.size-row input:focus{border-color:var(--red)}
.size-row .remove-size{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px;transition:.15s}
.size-row .remove-size:hover{color:var(--red)}

/* ===== DELIVERY CARDS ===== */
.delivery-cards{display:flex;flex-direction:column;gap:10px}
.delivery-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;align-items:center;gap:14px}
.delivery-card.delivered{opacity:.6}
.delivery-card .dc-num{font-size:20px;font-weight:800;color:var(--red);min-width:36px}
.delivery-card .dc-info{flex:1}
.delivery-card .dc-name{font-size:14px;font-weight:600}
.delivery-card .dc-addr{font-size:12px;color:var(--muted);margin-top:2px}
.delivery-card .dc-items{font-size:12px;color:var(--muted)}

/* ===== TABLES (mesas) ===== */
.mesas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}
.mesa-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:.2s}
.mesa-card:hover{transform:translateY(-2px)}
.mesa-card.occupied{border-color:var(--red);background:rgba(230,57,70,.08)}
.mesa-card.free{border-color:var(--green)}
.mesa-card .mesa-num{font-size:22px;font-weight:800}
.mesa-card .mesa-status{font-size:11px;color:var(--muted);margin-top:4px}
.mesa-card.occupied .mesa-status{color:var(--red)}
.mesa-card.free .mesa-status{color:var(--green)}

/* ===== ALERT ===== */
.alert{padding:10px 16px;border-radius:8px;font-size:13px;display:none;margin-bottom:12px}
.alert-success{background:rgba(46,160,67,.15);color:#3fb950;border:1px solid rgba(46,160,67,.3)}
.alert-error{background:rgba(230,57,70,.15);color:var(--red);border:1px solid rgba(230,57,70,.3)}

/* ===== ACTIONS ===== */
.row-actions{display:flex;gap:6px;align-items:center}

@media(max-width:900px){
  .chart-row{grid-template-columns:1fr}
  .pdv-layout{grid-template-columns:1fr}
  .kitchen-cols{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  #sidebar{width:56px}
  .nav-label{display:none}
  .nav-badge{display:none}
  #main-content{padding:14px}
  .kitchen-cols{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🍕</div>
    <h1>Pizzaria Patrício</h1>
    <p>Sistema de Gestão — Faça login para continuar</p>
    <input type="text" id="login-user" placeholder="Usuário" autocomplete="username">
    <input type="password" id="login-pass" placeholder="Senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">⚠ Usuário ou senha incorretos.</div>
    <div style="margin-top:20px;padding:14px;background:#0d1117;border-radius:10px;text-align:left;font-size:12px;color:#8b949e;border:1px solid #30363d">
      <div style="font-weight:700;color:#e6edf3;margin-bottom:8px">🔑 Acessos padrão (senha: <span style='color:#e63946'>pizza123</span>)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
        <span>👑 admin</span><span>👔 gerente</span>
        <span>💰 caixa</span><span>👨‍🍳 cozinha</span>
        <span>🛵 entregador</span>
      </div>
      <div style="margin-top:8px;color:#6e7681;font-size:11px">Altere as senhas em Minha Conta após o login</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex-direction:column;height:100vh">
  <header class="app-header">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <h2 id="page-title">Dashboard</h2>
    <div class="hactions">
      <span id="header-date" style="font-size:12px;color:var(--muted)"></span>
      <button class="btn btn-red btn-sm" onclick="navigate('pdv')" style="margin-left:8px">+ Novo Pedido</button>
      <div class="user-chip" style="margin-left:4px">
        <span id="header-name">-</span>
        <span class="badge" id="header-role">-</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </header>
  <div class="app-body">
    <nav id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🍕</div>
        <div class="logo-text"><strong>Pizzaria Patrício</strong><span>Sistema v2.0</span></div>
      </div>
      <div id="nav-items"></div>
    </nav>
    <main id="main-content"></main>
  </div>
</div>

<script>
// ============================================================
// STORAGE
// ============================================================
const S = {
  get:(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};

function initData(){
  const defaultUsers=[
    {id:1,username:'admin',     password:'pizza123',name:'Administrador',  role:'admin',      active:true},
    {id:2,username:'gerente',   password:'pizza123',name:'Gerente',        role:'gerente',    active:true},
    {id:3,username:'caixa',     password:'pizza123',name:'Caixa',          role:'caixa',      active:true},
    {id:4,username:'cozinha',   password:'pizza123',name:'Cozinha',        role:'cozinha',    active:true},
    {id:5,username:'entregador',password:'pizza123',name:'Entregador',     role:'entregador', active:true},
  ];
  if(!S.get('pp_users',null)){
    S.set('pp_users',defaultUsers);
  } else if(!S.get('pp_v2',null)){
    // migração: garante que todos os usuários padrão existem
    const users=S.get('pp_users',[]);
    defaultUsers.forEach(du=>{
      if(!users.find(u=>u.username===du.username)) users.push(du);
    });
    S.set('pp_users',users);
  }
  S.set('pp_v2','1');
  if(!S.get('pp_orders',null)) S.set('pp_orders',[]);

let currentUser = null;

const ROLE_PAGES = {
  admin:      ['dashboard','pdv','orders','tables','delivery','kitchen','products','borders','clients','drivers','users','financeiro','account'],
  gerente:    ['dashboard','pdv','orders','tables','delivery','kitchen','products','clients','financeiro','account'],
  caixa:      ['pdv','orders','tables','account'],
  entregador: ['delivery','account'],
  cozinha:    ['kitchen','account'],
};

function buildSidebar(){
  const pages = ROLE_PAGES[currentUser.role]||[];
  const sections = {};
  pages.forEach(p=>{
    const info=ALL_PAGES[p];
    if(!sections[info.section]) sections[info.section]=[];
    sections[info.section].push(p);
  });
  let html='';
  Object.entries(sections).forEach(([sec,ps])=>{
    html+=`<div class="nav-section"><div class="nav-section-label">${sec}</div>`;
    ps.forEach(p=>{
      const info=ALL_PAGES[p];
      const badge=info.badge?getBadgeCount(info.badge):'';
      html+=`<button id="nav-${p}" class="nav-btn" onclick="navigate('${p}')">
        <span class="nav-icon">${info.icon}</span>
        <span class="nav-label">${info.label}</span>
        ${badge>0?`<span class="nav-badge">${badge}</span>`:''}
      </button>`;
    });
    html+='</div>';
  });
  document.getElementById('nav-items').innerHTML=html;
}

function getBadgeCount(type){
  if(type==='orders') return S.get('pp_orders',[]).filter(o=>o.status==='pending'||o.status==='making').length;
  return 0;
}

let currentPage='';
const PAGE_TITLES={dashboard:'Dashboard',pdv:'PDV / Novo Pedido',orders:'Pedidos',tables:'Mesas',delivery:'Delivery',kitchen:'Painel Cozinha',products:'Produtos',borders:'Bordas',clients:'Clientes',drivers:'Entregadores',users:'Usuários',financeiro:'Financeiro',account:'Minha Conta'};

function navigate(page){
  if(!ROLE_PAGES[currentUser.role]?.includes(page)) return;
  currentPage=page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('nav-'+page);
  if(btn) btn.classList.add('active');
  document.getElementById('page-title').textContent=PAGE_TITLES[page]||page;
  const el=document.getElementById('main-content');
  el.innerHTML='';
  ({dashboard,pdv,orders,tables,delivery,kitchen,products,borders,clients,drivers,users,financeiro,account})[page]?.(el);
}

function nextId(arr){return arr.length?Math.max(...arr.map(x=>x.id))+1:1;}
function fmt(v){return 'R$ '+Number(v||0).toFixed(2).replace('.',',');}
function now(){return new Date().toLocaleString('pt-BR');}
function today(){return new Date().toLocaleDateString('pt-BR');}

function statusBadge(s){
  const m={pending:['badge-pending','⏳ Aguardando'],making:['badge-making','🔥 Preparando'],delivery:['badge-delivery','🛵 Em Entrega'],done:['badge-done','✅ Entregue'],cancelled:['badge-cancelled','❌ Cancelado']};
  const[c,l]=m[s]||['',''];
  return `<span class="badge ${c}">${l}</span>`;
}

function showAlert(id,type,msg){
  const el=document.getElementById(id);if(!el)return;
  el.className=`alert alert-${type}`;el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}

function closeModal(){document.querySelectorAll('.modal-overlay').forEach(m=>m.remove());}

function openModal(html){
  const d=document.createElement('div');
  d.className='modal-overlay';
  d.innerHTML=html;
  d.addEventListener('click',e=>{if(e.target===d)closeModal();});
  document.body.appendChild(d);
  return d;
}

function dashboard(el){
  const orders=S.get('pp_orders',[]);
  const todayStr=today();
  const todayOrders=orders.filter(o=>o.createdAt&&o.createdAt.includes(todayStr));
  const monthOrders=orders.filter(o=>o.createdAt&&o.createdAt.includes(new Date().toLocaleDateString('pt-BR').slice(3)));
  const todaySales=todayOrders.filter(o=>o.status==='done').reduce((s,o)=>s+(o.total||0),0);
  const monthSales=monthOrders.filter(o=>o.status==='done').reduce((s,o)=>s+(o.total||0),0);
  const costs=monthSales*0.45;
  const profit=monthSales-costs;
  const active=orders.filter(o=>['pending','making','delivery'].includes(o.status)).length;
  const delivered=orders.filter(o=>o.status==='done').length;
  const cancelled=orders.filter(o=>o.status==='cancelled').length;

  // Last 7 days
  const last7=[];const labels7=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toLocaleDateString('pt-BR');
    labels7.push(['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()]);
    last7.push(orders.filter(o=>o.status==='done'&&o.createdAt?.includes(ds)).reduce((s,o)=>s+(o.total||0),0));
  }

  // Top products
  const itemCounts={};
  orders.forEach(o=>o.items?.forEach(i=>{itemCounts[i.name]=(itemCounts[i.name]||0)+i.qty;}));
  const topItems=Object.entries(itemCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCount=topItems[0]?.[1]||1;

  el.innerHTML=`
  <div class="page-header">
    <h2>Dashboard</h2>
    <div style="display:flex;gap:8px">
      <select style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:13px">
        <option>Este Mês</option><option>Esta Semana</option><option>Hoje</option>
      </select>
      <button class="btn btn-red btn-sm" onclick="navigate('pdv')">+ Novo Pedido</button>
    </div>
  </div>
  <div class="page-sub">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>

  <div class="metric-grid">
    <div class="metric-card">
      <div class="metric-icon" style="background:rgba(251,133,0,.15)">💰</div>
      <div><div class="metric-val">${fmt(todaySales)}</div><div class="metric-label">Vendas Hoje</div><div class="metric-sub" style="color:var(--muted)">${todayOrders.filter(o=>o.status==='done').length} pedidos</div></div>
    </div>
    <div class="metric-card">
      <div class="metric-icon" style="background:rgba(31,111,235,.15)">📋</div>
      <div><div class="metric-val">${fmt(monthSales)}</div><div class="metric-label">Faturamento do Mês</div><div class="metric-sub" style="color:var(--green)">↑ ${monthOrders.filter(o=>o.status==='done').length} pedidos</div></div>
    </div>
    <div class="metric-card">
      <div class="metric-icon" style="background:rgba(${profit>=0?'46,160,67':'230,57,70'},.15)">${profit>=0?'✅':'⚠️'}</div>
      <div><div class="metric-val">${fmt(profit)}</div><div class="metric-label">Lucro Estimado</div><div class="metric-sub" style="color:${profit>=0?'var(--green)':'var(--red)'}">${profit>=0?'Positivo':'Negativo'}</div></div>
    </div>
    <div class="metric-card">
      <div class="metric-icon" style="background:rgba(139,92,246,.15)">🔥</div>
      <div><div class="metric-val">${active}</div><div class="metric-label">Em Andamento</div><div class="metric-sub" style="color:var(--muted)">Pedidos ativos</div></div>
    </div>
    <div class="metric-card">
      <div class="metric-icon" style="background:rgba(46,160,67,.15)">🛵</div>
      <div><div class="metric-val">${delivered}</div><div class="metric-label">Entregues</div><div class="metric-sub" style="color:var(--muted)">Total geral</div></div>
    </div>
    <div class="metric-card">
      <div class="metric-icon" style="background:rgba(230,57,70,.15)">❌</div>
      <div><div class="metric-val">${cancelled}</div><div class="metric-label">Cancelados</div><div class="metric-sub" style="color:var(--muted)">Total geral</div></div>
    </div>
  </div>

  <div class="chart-row">
    <div class="chart-box">
      <h3>📈 Faturamento dos Últimos 7 Dias</h3>
      <canvas id="chart7" height="200"></canvas>
    </div>
    <div class="chart-box">
      <h3>🏆 Pizzas Mais Vendidas</h3>
      <div class="ranking-list" id="ranking-list">
        ${topItems.length===0?'<p style="color:var(--muted);font-size:13px">Nenhum pedido ainda</p>':
          topItems.map(([name,count],i)=>`
          <div class="rank-item">
            <div class="rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</div>
            <div class="rank-bar-wrap">
              <div class="rank-name">${name}</div>
              <div class="rank-bar" style="width:${Math.round(count/maxCount*100)}%"></div>
            </div>
            <div class="rank-count">${count}x</div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;

  // Chart
  setTimeout(()=>{
    const ctx=document.getElementById('chart7')?.getContext('2d');
    if(!ctx)return;
    new Chart(ctx,{type:'bar',data:{labels:labels7,datasets:[{data:last7,backgroundColor:'rgba(230,57,70,.7)',borderRadius:6,borderSkipped:false}]},options:{plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#8b949e'}},y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#8b949e',callback:v=>'R$'+v}}}}});

function productCard(p){
  const minPrice=p.sizes&&p.sizes.length?Math.min(...p.sizes.map(s=>s.price)):0;
  const icons={Pizza:'🍕',Salgado:'🥐',Bebida:'🥤',Sobremesa:'🍰'};
  return `<div class="product-card" onclick="openProductOptions(${p.id})">
    <div class="pc-icon">${icons[p.category]||'🍽️'}</div>
    <div class="pc-name">${p.name}</div>
    <div class="pc-price">A partir de ${fmt(minPrice)}</div>
    <div class="pc-sizes">${p.sizes?.map(s=>s.name).join(' · ')||''}</div>
  </div>`;
}

function filterCat(cat,btn){
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const products=S.get('pp_products',[]).filter(p=>p.active);
  const filtered=cat==='Todos'?products:products.filter(p=>p.category===cat);
  document.getElementById('product-grid').innerHTML=filtered.map(p=>productCard(p)).join('');
}

function filterProducts(q){
  const products=S.get('pp_products',[]).filter(p=>p.active&&p.name.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('product-grid').innerHTML=products.map(p=>productCard(p)).join('');
}

function openProductOptions(id){
  const p=S.get('pp_products',[]).find(x=>x.id===id);
  if(!p)return;
  const isPizza=p.category==='Pizza';
  const borders=isPizza?S.get('pp_borders',[]):[];
  openModal(`<div class="modal">
    <h3>${p.category==='Pizza'?'🍕':p.category==='Salgado'?'🥐':'🥤'} ${p.name}</h3>
    ${p.description?`<p style="font-size:13px;color:var(--muted);margin-bottom:16px">${p.description}</p>`:''}
    <div class="form-row">
      <label>Tamanho</label>
      <select id="po-size">
        ${p.sizes.map(s=>`<option value="${s.price}" data-name="${s.name}">${s.name} — ${fmt(s.price)}</option>`).join('')}
      </select>
    </div>
    ${isPizza?`<div class="form-row">
      <label>Borda</label>
      <select id="po-border">
        ${borders.map(b=>`<option value="${b.price}" data-name="${b.name}">${b.name}${b.price>0?' + '+fmt(b.price):''}</option>`).join('')}
      </select>
    </div>`:''}
    <div class="form-row">
      <label>Quantidade</label>
      <input id="po-qty" type="number" value="1" min="1">
    </div>
    <div class="form-row">
      <label>Observação</label>
      <input id="po-obs" placeholder="Ex: sem cebola, bem assado...">
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-red" onclick="addToCart(${id})">Adicionar ao Carrinho</button>
    </div>
  </div>`);
}

function addToCart(id){
  const p=S.get('pp_products',[]).find(x=>x.id===id);
  if(!p)return;
  const sizeEl=document.getElementById('po-size');
  const sizeName=sizeEl.options[sizeEl.selectedIndex].dataset.name;
  const sizePrice=parseFloat(sizeEl.value);
  const borderEl=document.getElementById('po-border');
  const borderName=borderEl?borderEl.options[borderEl.selectedIndex]?.dataset.name:'';
  const borderPrice=borderEl?parseFloat(borderEl.value)||0:0;
  const qty=parseInt(document.getElementById('po-qty').value)||1;
  const obs=document.getElementById('po-obs').value;
  const unitPrice=sizePrice+borderPrice;
  cart.push({id:p.id,name:p.name,category:p.category,size:sizeName,border:borderName,qty,unitPrice,price:unitPrice*qty,obs});
  closeModal();
  renderCart();
}

function renderCart(){
  const el=document.getElementById('cart-items');
  if(!el)return;
  if(cart.length===0){el.innerHTML='<p style="color:var(--muted);font-size:13px;text-align:center;margin-top:20px">Nenhum item adicionado</p>';updateCartTotal();return;}
  el.innerHTML=cart.map((c,i)=>`
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${c.qty}x ${c.name}</div>
        <div class="cart-item-sub">${c.size}${c.border&&c.border!=='Sem Borda'?' · Borda '+c.border:''}${c.obs?' · '+c.obs:''}</div>
      </div>
      <div class="cart-item-price">${fmt(c.price)}</div>
      <button class="cart-item-remove" onclick="removeCart(${i})">✕</button>
    </div>`).join('');
  updateCartTotal();
}

function removeCart(i){cart.splice(i,1);renderCart();}

function updateCartTotal(){
  const total=cart.reduce((s,c)=>s+c.price,0);
  const sub=document.getElementById('cart-sub');
  const tot=document.getElementById('cart-total-val');
  if(sub) sub.textContent=fmt(total);
  if(tot) tot.textContent=fmt(total);
}

function setOrderType(type,btn){
  orderType=type;
  btn.parentElement.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const addrRow=document.getElementById('cart-addr-row');
  if(addrRow) addrRow.style.display=type==='delivery'?'block':'none';
}

function setPay(type,btn){
  selectedPayment=type;
  btn.closest('.payment-select').querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function submitOrder(){
  const client=document.getElementById('cart-client')?.value.trim();
  const addr=document.getElementById('cart-addr')?.value.trim();
  if(!client){alert('Informe o nome do cliente');return;}
  if(cart.length===0){alert('Adicione pelo menos um item');return;}
  if(orderType==='delivery'&&!addr){alert('Informe o endereço de entrega');return;}
  const orders=S.get('pp_orders',[]);
  const total=cart.reduce((s,c)=>s+c.price,0);
  const obs=document.getElementById('cart-obs')?.value;
  orders.push({id:nextId(orders),client,address:addr,type:orderType,items:cart.map(c=>({...c})),total,payment:selectedPayment,obs,status:'pending',createdAt:now(),createdBy:currentUser.username});
  S.set('pp_orders',orders);
  cart=[];
  buildSidebar(); // update badge
  alert(`✅ Pedido #${orders[orders.length-1].id} criado com sucesso!`);
  navigate('pdv');
}

function orders(el){
  const allOrders=S.get('pp_orders',[]);
  el.innerHTML=`

    <h2>🧾 Pedidos</h2>
    <button class="btn btn-red" onclick="navigate('pdv')">+ Novo Pedido</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <button class="cat-tab active" onclick="filterOrders('all',this)">Todos (${allOrders.length})</button>
    <button class="cat-tab" onclick="filterOrders('pending',this)">⏳ Aguardando (${allOrders.filter(o=>o.status==='pending').length})</button>
    <button class="cat-tab" onclick="filterOrders('making',this)">🔥 Preparando (${allOrders.filter(o=>o.status==='making').length})</button>
    <button class="cat-tab" onclick="filterOrders('delivery',this)">🛵 Em Entrega (${allOrders.filter(o=>o.status==='delivery').length})</button>
    <button class="cat-tab" onclick="filterOrders('done',this)">✅ Entregues (${allOrders.filter(o=>o.status==='done').length})</button>
  </div>
  <div class="table-box">
    <table><thead><tr><th>#</th><th>Cliente</th><th>Tipo</th><th>Itens</th><th>Total</th><th>Pagamento</th><th>Status</th><th>Criado</th><th>Ações</th></tr></thead>
    <tbody id="orders-tbody">${renderOrdersRows(allOrders)}</tbody></table>
  </div>`;
}

function renderOrdersRows(list){
  if(!list.length) return '<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:30px">Nenhum pedido</td></tr>';
  const typeLabel={delivery:'🛵 Delivery',mesa:'🪑 Mesa',retirada:'🏠 Retirada'};
  const payLabel={dinheiro:'💵',cartao:'💳',pix:'📱'};
  return [...list].reverse().map(o=>`<tr>
    <td><strong>#${o.id}</strong></td>
    <td>${o.client}</td>
    <td>${typeLabel[o.type]||o.type||'-'}</td>
    <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.items?.map(i=>`${i.qty}x ${i.name}`).join(', ')||'-'}</td>
    <td><strong>${fmt(o.total)}</strong></td>
    <td>${payLabel[o.payment]||''} ${o.payment||'-'}</td>
    <td>${statusBadge(o.status)}</td>
    <td style="font-size:12px;color:var(--muted)">${o.createdAt}</td>
    <td class="row-actions">
      ${o.status!=='done'&&o.status!=='cancelled'?`<button class="btn btn-blue btn-xs" onclick="advanceOrder(${o.id})">Avançar →</button>`:''}
      <button class="btn btn-gray btn-xs" onclick="viewOrder(${o.id})">👁</button>
      ${currentUser.role==='admin'||currentUser.role==='gerente'?`<button class="btn btn-xs" style="background:rgba(230,57,70,.15);color:var(--red);border:1px solid rgba(230,57,70,.3)" onclick="cancelOrder(${o.id})">✕</button>`:''}
    </td>
  </tr>`).join('');
}

function filterOrders(status,btn){
  document.querySelectorAll('.cat-tabs .cat-tab, .page .cat-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const all=S.get('pp_orders',[]);
  const list=status==='all'?all:all.filter(o=>o.status===status);
  document.getElementById('orders-tbody').innerHTML=renderOrdersRows(list);
}

function advanceOrder(id){
  const orders=S.get('pp_orders',[]);
  const o=orders.find(x=>x.id===id);
  if(!o)return;
  const flow=['pending','making','delivery','done'];
  const idx=flow.indexOf(o.status);
  if(idx<flow.length-1){o.status=flow[idx+1];S.set('pp_orders',orders);buildSidebar();navigate(currentPage);}
}

function cancelOrder(id){
  if(!confirm('Cancelar este pedido?'))return;
  const orders=S.get('pp_orders',[]);
  const o=orders.find(x=>x.id===id);
  if(o){o.status='cancelled';S.set('pp_orders',orders);buildSidebar();navigate('orders');}
}

function viewOrder(id){
  const o=S.get('pp_orders',[]).find(x=>x.id===id);
  if(!o)return;
  openModal(`<div class="modal">
    <h3>Pedido #${o.id}</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">${o.createdAt} — ${o.client}</p>
    <table style="margin-bottom:16px">
      <thead><tr><th>Item</th><th>Tamanho</th><th>Borda</th><th>Qtd</th><th>Preço</th></tr></thead>
      <tbody>
        ${o.items?.map(i=>`<tr><td>${i.name}</td><td>${i.size||'-'}</td><td>${i.border||'-'}</td><td>${i.qty}</td><td>${fmt(i.price)}</td></tr>`).join('')}
      </tbody>
    </table>
    <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:700;border-top:1px solid var(--border);padding-top:12px">
      <span>Total</span><span style="color:var(--red)">${fmt(o.total)}</span>
    </div>
    ${o.obs?`<p style="margin-top:10px;font-size:13px;color:var(--muted)">📝 ${o.obs}</p>`:''}
    ${o.address?`<p style="margin-top:6px;font-size:13px;color:var(--muted)">📍 ${o.address}</p>`:''}
    <div class="modal-footer"><button class="btn btn-gray" onclick="closeModal()">Fechar</button></div>
  </div>`);
}

function kitchen(el){
  const orders=S.get('pp_orders',[]);
  const pending=orders.filter(o=>o.status==='pending');
  const making=orders.filter(o=>o.status==='making');
  const ready=orders.filter(o=>o.status==='delivery');

  el.innerHTML=`
  <div class="page-header" style="margin-bottom:16px">
    <h2>👨‍🍳 Painel Cozinha</h2>
    <button class="btn btn-gray btn-sm" onclick="navigate('kitchen')">↻ Atualizar</button>
  </div>
  <div class="kitchen-cols">
    <div>
      <div class="kitchen-col-title kc-pending">⏳ Aguardando (${pending.length})</div>
      ${pending.map(o=>kitchenCard(o,'pending')).join('')||'<p style="color:var(--muted);font-size:13px;text-align:center">Nenhum</p>'}
    </div>
    <div>
      <div class="kitchen-col-title kc-making">🔥 Preparando (${making.length})</div>
      ${making.map(o=>kitchenCard(o,'making')).join('')||'<p style="color:var(--muted);font-size:13px;text-align:center">Nenhum</p>'}
    </div>
    <div>
      <div class="kitchen-col-title kc-ready">✅ Pronto (${ready.length})</div>
      ${ready.map(o=>kitchenCard(o,'delivery')).join('')||'<p style="color:var(--muted);font-size:13px;text-align:center">Nenhum</p>'}
    </div>
  </div>`;
}

function kitchenCard(o,status){
  return `<div class="kitchen-card ${status==='pending'&&(new Date()-new Date(o.createdAt.split(', ').join(' ')))>600000?'urgent':''}">
    <h4><span>#${o.id} — ${o.client}</span>${statusBadge(o.status)}</h4>
    <div class="kc-items">${o.items?.map(i=>`• ${i.qty}x ${i.name} (${i.size||''}${i.border&&i.border!=='Sem Borda'?' | Borda '+i.border:''})`).join('<br>')||''}</div>
    ${o.obs?`<div style="font-size:11px;color:var(--orange);margin-bottom:8px">📝 ${o.obs}</div>`:''}
    <div class="kc-time">⏱ ${o.createdAt}</div>
    <div style="display:flex;gap:6px">
      ${status==='pending'?`<button class="btn btn-blue btn-sm" style="flex:1;justify-content:center" onclick="advanceOrder(${o.id})">🔥 Iniciar</button>`:''}
      ${status==='making'?`<button class="btn btn-green btn-sm" style="flex:1;justify-content:center" onclick="advanceOrder(${o.id})">✅ Pronto</button>`:''}
      ${status==='delivery'?`<span style="color:var(--green);font-size:12px;font-weight:600">Aguardando entregador</span>`:''}
    </div>
  </div>`;
}

  const orders=S.get('pp_orders',[]);
  const active=orders.find(o=>o.tableId===id&&['pending','making'].includes(o.status));
  if(active) viewOrder(active.id);
  else{ navigate('pdv'); setTimeout(()=>{const sel=document.querySelector('[onclick*="setOrderType(\'mesa\'"]');if(sel)sel.click();},100); }
}

function openProductForm(id){
  const items=S.get('pp_products',[]);
  const p=id?items.find(x=>x.id===id):null;
  const sizes=p?.sizes||[{name:'',price:''}];
  openModal(`<div class="modal modal-lg">
    <h3>${p?'✏️ Editar Produto':'➕ Novo Produto'}</h3>
    <div class="form-cols">
      <div class="form-row"><label>Nome</label><input id="pf-name" value="${p?.name||''}"></div>
      <div class="form-row"><label>Categoria</label>
        <select id="pf-cat">
          ${['Pizza','Salgado','Bebida','Sobremesa'].map(c=>`<option ${p?.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row"><label>Descrição</label><input id="pf-desc" value="${p?.description||''}"></div>
    <div class="form-row">
      <label>Tamanhos e Preços <button type="button" class="btn btn-gray btn-xs" onclick="addSizeRow()" style="margin-left:8px">+ Tamanho</button></label>
      <div id="sizes-container">
        ${sizes.map((s,i)=>sizeRowHtml(s.name,s.price,i)).join('')}
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-red" onclick="saveProduct(${id||'null'})">Salvar</button>
    </div>
  </div>`);
}

function sizeRowHtml(name,price,i){
  return `<div class="size-row" id="sz-${i}">
    <input placeholder="Nome (ex: Grande)" value="${name}" data-size-name>
    <input placeholder="Preço" type="number" step="0.01" value="${price}" data-size-price style="max-width:120px">
    <button class="remove-size" onclick="this.closest('.size-row').remove()">✕</button>
  </div>`;
}

let sizeIdx=10;
function addSizeRow(){
  const c=document.getElementById('sizes-container');
  c.insertAdjacentHTML('beforeend',sizeRowHtml('','',sizeIdx++));
}

function saveProduct(id){
  const name=document.getElementById('pf-name').value.trim();
  const category=document.getElementById('pf-cat').value;
  const description=document.getElementById('pf-desc').value.trim();
  if(!name){alert('Informe o nome do produto');return;}
  const sizeRows=document.querySelectorAll('#sizes-container .size-row');
  const sizes=[];
  sizeRows.forEach(row=>{
    const n=row.querySelector('[data-size-name]').value.trim();
    const pr=parseFloat(row.querySelector('[data-size-price]').value);
    if(n&&!isNaN(pr)) sizes.push({name:n,price:pr});
  });
  if(!sizes.length){alert('Adicione pelo menos um tamanho/preço');return;}
  const items=S.get('pp_products',[]);
  if(id){const p=items.find(x=>x.id===id);if(p){p.name=name;p.category=category;p.description=description;p.sizes=sizes;}}
  else items.push({id:nextId(items),name,category,description,active:true,sizes});
  S.set('pp_products',items);
  closeModal();
  navigate('products');
}

function toggleProduct(id){
  const items=S.get('pp_products',[]);
  const p=items.find(x=>x.id===id);
  if(p){p.active=!p.active;S.set('pp_products',items);navigate('products');}
}

function deleteProduct(id){
  if(!confirm('Excluir este produto?'))return;
  S.set('pp_products',S.get('pp_products',[]).filter(p=>p.id!==id));
  navigate('products');
}

    <table><thead><tr><th>#</th><th>Nome</th><th>Usuário</th><th>Status</th><th>Entregas</th><th>Ações</th></tr></thead>
    <tbody>
      ${items.length===0?'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">Nenhum entregador cadastrado</td></tr>':
        items.map(u=>{const cnt=orders.filter(o=>o.status==='done').length;return`<tr>
        <td>${u.id}</td><td><strong>${u.name}</strong></td><td>${u.username}</td>
        <td><span class="badge ${u.active?'badge-active':'badge-inactive'}">${u.active?'Ativo':'Inativo'}</span></td>
        <td>${cnt}</td>
        <td class="row-actions">
          <button class="btn btn-blue btn-xs" onclick="openUserForm(${u.id})">✏️</button>
          <button class="btn btn-gray btn-xs" onclick="toggleUser(${u.id})">${u.active?'Desativar':'Ativar'}</button>
        </td>
      </tr>`}).join('')}
    </tbody></table>
  </div>`;
}

// ============================================================
// USERS
// ============================================================
function users(el){
  const items=S.get('pp_users',[]);
  el.innerHTML=`
  <div class="page-header" style="margin-bottom:16px">
    <h2>👥 Usuários</h2>
    <button class="btn btn-red" onclick="openUserForm()">+ Novo Usuário</button>
  </div>
  <div id="users-alert" class="alert"></div>
  <div class="table-box">
    <table><thead><tr><th>#</th><th>Nome</th><th>Usuário</th><th>Cargo</th><th>Status</th><th>Ações</th></tr></thead>
    <tbody>
      ${items.map(u=>`<tr>
        <td>${u.id}</td><td><strong>${u.name}</strong></td><td>${u.username}</td>
        <td>${roleLabel(u.role)}</td>
        <td><span class="badge ${u.active?'badge-active':'badge-inactive'}">${u.active?'Ativo':'Inativo'}</span></td>
        <td class="row-actions">
          <button class="btn btn-blue btn-xs" onclick="openUserForm(${u.id})">✏️ Editar</button>
          ${u.id!==currentUser.id?`<button class="btn btn-gray btn-xs" onclick="toggleUser(${u.id})">${u.active?'Desativar':'Ativar'}</button>`:''}
        </td>
      </tr>`).join('')}
    </tbody></table>
  </div>`;
}

function openUserForm(id,defaultRole){
  const items=S.get('pp_users',[]);
  const u=id?items.find(x=>x.id===id):null;
  const roles=['admin','gerente','caixa','cozinha','entregador'];
  openModal(`<div class="modal">
    <h3>${u?'✏️ Editar Usuário':'➕ Novo Usuário'}</h3>
    <div class="form-row"><label>Nome completo</label><input id="uf-name" value="${u?.name||''}"></div>
    <div class="form-cols">
      <div class="form-row"><label>Usuário (login)</label><input id="uf-user" value="${u?.username||''}"></div>
      <div class="form-row"><label>Senha ${u?'(em branco = manter)':''}</label><input id="uf-pass" type="password"></div>
    </div>
    <div class="form-row"><label>Cargo</label>
      <select id="uf-role">
        ${roles.map(r=>`<option value="${r}" ${(u?.role||defaultRole||'caixa')===r?'selected':''}>${roleLabel(r)}</option>`).join('')}
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-red" onclick="saveUser(${id||'null'})">Salvar</button>
    </div>
  </div>`);
}

function saveUser(id){
  const name=document.getElementById('uf-name').value.trim();
  const username=document.getElementById('uf-user').value.trim();
  const pass=document.getElementById('uf-pass').value;
  const role=document.getElementById('uf-role').value;
  if(!name||!username){alert('Preencha nome e usuário');return;}
  const items=S.get('pp_users',[]);
  if(id){const u=items.find(x=>x.id===id);if(u){u.name=name;u.username=username;u.role=role;if(pass)u.password=pass;}}
  else{if(!pass){alert('Informe a senha');return;}if(items.find(u=>u.username===username)){alert('Usuário já existe');return;}items.push({id:nextId(items),name,username,password:pass,role,active:true});}
  S.set('pp_users',items);closeModal();navigate(currentPage==='drivers'?'drivers':'users');
}

function toggleUser(id){
  const items=S.get('pp_users',[]);
  const u=items.find(x=>x.id===id);
  if(u){u.active=!u.active;S.set('pp_users',items);navigate(currentPage);}
}

// ============================================================
// FINANCEIRO
// ============================================================
function financeiro(el){
  const orders=S.get('pp_orders',[]).filter(o=>o.status==='done');
  const total=orders.reduce((s,o)=>s+(o.total||0),0);
  const byPayment={dinheiro:0,cartao:0,pix:0};
  orders.forEach(o=>{ if(byPayment[o.payment]!==undefined) byPayment[o.payment]+=o.total||0; });
  const cost=total*0.45;const profit=total-cost;

  // Last 30 orders
  const recent=[...orders].reverse().slice(0,30);

  el.innerHTML=`
  <div class="page-header" style="margin-bottom:16px"><h2>💰 Financeiro</h2></div>
  <div class="metric-grid" style="margin-bottom:20px">
    <div class="metric-card"><div class="metric-icon" style="background:rgba(31,111,235,.15)">💵</div>
      <div><div class="metric-val">${fmt(total)}</div><div class="metric-label">Faturamento Total</div></div></div>
    <div class="metric-card"><div class="metric-icon" style="background:rgba(230,57,70,.15)">📉</div>
      <div><div class="metric-val">${fmt(cost)}</div><div class="metric-label">Custo Estimado (45%)</div></div></div>
    <div class="metric-card"><div class="metric-icon" style="background:rgba(46,160,67,.15)">📈</div>
      <div><div class="metric-val">${fmt(profit)}</div><div class="metric-label">Lucro Estimado</div></div></div>
  </div>
  <div class="chart-row" style="margin-bottom:20px">
    <div class="chart-box">
      <h3>Formas de Pagamento</h3>
      <canvas id="pay-chart" height="160"></canvas>
    </div>
    <div class="chart-box">
      <h3>Resumo</h3>
      <table>
        <tr><td>💵 Dinheiro</td><td style="text-align:right;font-weight:700">${fmt(byPayment.dinheiro)}</td></tr>
        <tr><td>💳 Cartão</td><td style="text-align:right;font-weight:700">${fmt(byPayment.cartao)}</td></tr>
        <tr><td>📱 Pix</td><td style="text-align:right;font-weight:700">${fmt(byPayment.pix)}</td></tr>
        <tr style="border-top:2px solid var(--border)"><td><strong>Total</strong></td><td style="text-align:right;font-weight:700;color:var(--red)">${fmt(total)}</td></tr>
      </table>
    </div>
  </div>
  <div class="table-box">
    <table><thead><tr><th>#</th><th>Cliente</th><th>Total</th><th>Pagamento</th><th>Data</th></tr></thead>
    <tbody>
      ${recent.map(o=>`<tr><td>#${o.id}</td><td>${o.client}</td><td><strong>${fmt(o.total)}</strong></td><td>${{dinheiro:'💵 Dinheiro',cartao:'💳 Cartão',pix:'📱 Pix'}[o.payment]||o.payment}</td><td style="font-size:12px;color:var(--muted)">${o.createdAt}</td></tr>`).join('') ||'<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px">Nenhuma venda registrada</td></tr>'}
    </tbody></table>
  </div>`;

  setTimeout(()=>{
    const ctx=document.getElementById('pay-chart')?.getContext('2d');
    if(!ctx)return;
    new Chart(ctx,{type:'doughnut',data:{labels:['Dinheiro','Cartão','Pix'],datasets:[{data:[byPayment.dinheiro,byPayment.cartao,byPayment.pix],backgroundColor:['#f0c000','#1f6feb','#27ae60'],borderWidth:0}]},options:{plugins:{legend:{labels:{color:'#e6edf3'}}}}});
  },50);
}

// ============================================================
// ACCOUNT
// ============================================================
function account(el){
  el.innerHTML=`
  <div class="page-header" style="margin-bottom:16px"><h2>🔑 Minha Conta</h2></div>
  <div class="form-box" style="max-width:440px">
    <div class="form-row"><label>Nome completo</label><input id="acc-name" value="${currentUser.name}"></div>
    <div class="form-row"><label>Usuário</label><input value="${currentUser.username}" disabled style="opacity:.5"></div>
    <div class="form-row"><label>Cargo</label><input value="${roleLabel(currentUser.role)}" disabled style="opacity:.5"></div>
    <div class="form-row"><label>Nova Senha</label><input id="acc-pass" type="password" placeholder="Deixe em branco para manter"></div>
    <div class="form-row"><label>Confirmar Senha</label><input id="acc-pass2" type="password"></div>
    <div id="acc-alert" class="alert"></div>
    <button class="btn btn-red" onclick="saveAccount()">💾 Salvar Alterações</button>
  </div>`;
}

function saveAccount(){
  const name=document.getElementById('acc-name').value.trim();
  const pass=document.getElementById('acc-pass').value;
  const pass2=document.getElementById('acc-pass2').value;
  if(!name){showAlert('acc-alert','error','Informe o nome');return;}
  if(pass&&pass!==pass2){showAlert('acc-alert','error','As senhas não coincidem');return;}
  const items=S.get('pp_users',[]);
  const u=items.find(x=>x.id===currentUser.id);
  if(u){u.name=name;if(pass)u.password=pass;}
  S.set('pp_users',items);
  currentUser.name=name;
  document.getElementById('header-name').textContent=name;
  showAlert('acc-alert','success','✅ Dados atualizados com sucesso!');
}

// ============================================================
// INIT
// ============================================================
initData();
</script>
</body>
</html>

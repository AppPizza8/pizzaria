<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzaria Patrício</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }

  /* ===== LOGIN ===== */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: linear-gradient(135deg, #1a1a2e, #c0392b);
  }
  .login-box {
    background: #fff; color: #333; padding: 40px 36px; border-radius: 16px;
    width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center;
  }
  .login-box .logo { font-size: 42px; margin-bottom: 8px; }
  .login-box h1 { font-size: 22px; color: #c0392b; margin-bottom: 4px; }
  .login-box p { font-size: 13px; color: #888; margin-bottom: 28px; }
  .login-box input {
    width: 100%; padding: 12px 14px; margin-bottom: 14px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 15px; outline: none; transition: border .2s;
  }
  .login-box input:focus { border-color: #c0392b; }
  .login-box button {
    width: 100%; padding: 13px; background: #c0392b; color: #fff;
    border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .login-box button:hover { background: #a93226; }
  .login-error { color: #c0392b; font-size: 13px; margin-top: 10px; display: none; }

  /* ===== APP ===== */
  #app { display: none; }
  header {
    background: #c0392b; padding: 0 24px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  header .brand { font-size: 20px; font-weight: 700; }
  header .user-info { display: flex; align-items: center; gap: 12px; font-size: 14px; }
  header .badge {
    background: rgba(255,255,255,0.25); padding: 3px 10px;
    border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  header button.logout {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
    transition: background .2s;
  }
  header button.logout:hover { background: rgba(255,255,255,0.3); }

  .layout { display: flex; height: calc(100vh - 60px); }

  /* ===== SIDEBAR ===== */
  nav {
    width: 210px; background: #16213e; padding: 16px 0;
    display: flex; flex-direction: column; gap: 2px; flex-shrink: 0;
  }
  nav button {
    background: none; border: none; color: #ccc; text-align: left;
    padding: 12px 20px; cursor: pointer; font-size: 14px; border-radius: 0;
    transition: all .2s; display: flex; align-items: center; gap: 10px;
  }
  nav button:hover { background: #0f3460; color: #fff; }
  nav button.active { background: #c0392b; color: #fff; font-weight: 600; }

  /* ===== CONTENT ===== */
  main { flex: 1; overflow-y: auto; padding: 24px; background: #0f0f23; }
  .page { display: none; }
  .page.active { display: block; }
  h2 { font-size: 22px; margin-bottom: 20px; color: #fff; }
  h3 { font-size: 16px; margin-bottom: 12px; color: #ddd; }

  /* Cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card {
    background: #16213e; border-radius: 12px; padding: 20px;
    text-align: center; border-left: 4px solid #c0392b;
  }
  .card .num { font-size: 36px; font-weight: 700; color: #c0392b; }
  .card .label { font-size: 13px; color: #aaa; margin-top: 4px; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 12px; overflow: hidden; }
  th { background: #0f3460; padding: 12px 16px; text-align: left; font-size: 13px; color: #aaa; }
  td { padding: 11px 16px; font-size: 14px; border-bottom: 1px solid #1e2a4a; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1a2a5e; }

  /* Buttons */
  .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .2s; }
  .btn-red { background: #c0392b; color: #fff; }
  .btn-red:hover { background: #a93226; }
  .btn-green { background: #27ae60; color: #fff; }
  .btn-green:hover { background: #1e8449; }
  .btn-blue { background: #2980b9; color: #fff; }
  .btn-blue:hover { background: #1f618d; }
  .btn-gray { background: #555; color: #fff; }
  .btn-gray:hover { background: #444; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* Forms */
  .form-box { background: #16213e; border-radius: 12px; padding: 24px; max-width: 500px; }
  .form-row { margin-bottom: 16px; }
  .form-row label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; padding: 10px 12px; background: #0f0f23; border: 1px solid #2a3a5e;
    border-radius: 8px; color: #fff; font-size: 14px; outline: none; transition: border .2s;
  }
  .form-row input:focus, .form-row select:focus { border-color: #c0392b; }
  .form-row select option { background: #16213e; }

  /* Status badges */
  .status {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .status-pending { background: #f39c12; color: #000; }
  .status-making { background: #2980b9; color: #fff; }
  .status-delivery { background: #8e44ad; color: #fff; }
  .status-done { background: #27ae60; color: #fff; }
  .status-active { background: #27ae60; color: #fff; }
  .status-inactive { background: #555; color: #fff; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  .modal {
    background: #16213e; border-radius: 14px; padding: 28px;
    width: 460px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { margin-bottom: 20px; font-size: 18px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  .actions { display: flex; gap: 6px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

  /* Kitchen cards */
  .kitchen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .kitchen-card {
    background: #16213e; border-radius: 12px; padding: 18px;
    border-top: 4px solid #f39c12;
  }
  .kitchen-card.making { border-top-color: #2980b9; }
  .kitchen-card h4 { font-size: 15px; margin-bottom: 8px; }
  .kitchen-card .items { font-size: 13px; color: #aaa; margin-bottom: 12px; line-height: 1.6; }
  .kitchen-card .time { font-size: 12px; color: #888; margin-bottom: 12px; }

  /* Delivery */
  .delivery-list { display: flex; flex-direction: column; gap: 12px; }
  .delivery-card {
    background: #16213e; border-radius: 12px; padding: 18px;
    display: flex; justify-content: space-between; align-items: center;
    border-left: 4px solid #8e44ad;
  }
  .delivery-card.done { border-left-color: #27ae60; opacity: .7; }

  /* My account */
  .account-box { background: #16213e; border-radius: 12px; padding: 28px; max-width: 400px; }
  .account-box p { font-size: 14px; color: #aaa; margin-bottom: 20px; }

  /* Alert */
  .alert {
    padding: 10px 16px; border-radius: 8px; margin-bottom: 16px;
    font-size: 14px; display: none;
  }
  .alert-success { background: #1e5631; color: #58d68d; }
  .alert-error { background: #641e16; color: #e74c3c; }

  /* Responsive */
  @media(max-width: 600px) {
    nav { width: 54px; }
    nav button span.nav-label { display: none; }
    nav button { justify-content: center; padding: 14px; }
    main { padding: 14px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">🍕</div>
    <h1>Pizzaria Patrício</h1>
    <p>Faça login para continuar</p>
    <input type="text" id="login-user" placeholder="Usuário" autocomplete="username">
    <input type="password" id="login-pass" placeholder="Senha" autocomplete="current-password">
    <button onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Usuário ou senha incorretos.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="brand">🍕 Pizzaria Patrício</div>
    <div class="user-info">
      <span id="header-name">-</span>
      <span class="badge" id="header-role">-</span>
      <button class="logout" onclick="doLogout()">Sair</button>
    </div>
  </header>
  <div class="layout">
    <nav id="sidebar"></nav>
    <main id="main-content"></main>
  </div>
</div>

<script>
// ============================================================
// DATA STORE (localStorage)
// ============================================================
function getData(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
}
function setData(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function initData() {
  if (!getData('pp_users', null)) {
    setData('pp_users', [
      { id: 1, username: 'admin', password: 'pizza123', name: 'Administrador', role: 'admin', active: true }
    ]);
  }
  if (!getData('pp_orders', null)) setData('pp_orders', []);
  if (!getData('pp_menu', null)) {
    setData('pp_menu', [
      { id: 1, name: 'Margherita', category: 'Pizza', price: 42.90, active: true },
      { id: 2, name: 'Calabresa', category: 'Pizza', price: 45.90, active: true },
      { id: 3, name: 'Frango c/ Catupiry', category: 'Pizza', price: 48.90, active: true },
      { id: 4, name: 'Coca-Cola 2L', category: 'Bebida', price: 12.00, active: true },
    ]);
  }
}

// ============================================================
// AUTH
// ============================================================
let currentUser = null;

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const users = getData('pp_users', []);
  const user = users.find(x => x.username === u && x.password === p && x.active);
  if (!user) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  currentUser = user;
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('header-name').textContent = user.name;
  document.getElementById('header-role').textContent = roleLabel(user.role);
  buildSidebar();
  navigate(defaultPage(user.role));
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
});

function doLogout() {
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

function roleLabel(r) {
  return { admin: 'Admin', gerente: 'Gerente', caixa: 'Caixa', entregador: 'Entregador', cozinha: 'Cozinha' }[r] || r;
}

function defaultPage(role) {
  return { admin: 'dashboard', gerente: 'dashboard', caixa: 'orders', entregador: 'delivery', cozinha: 'kitchen' }[role] || 'dashboard';
}

// ============================================================
// SIDEBAR
// ============================================================
const MENUS = {
  admin:      ['dashboard','orders','kitchen','delivery','menu','users','account'],
  gerente:    ['dashboard','orders','kitchen','menu','account'],
  caixa:      ['orders','account'],
  entregador: ['delivery','account'],
  cozinha:    ['kitchen','account'],
};

const MENU_ITEMS = {
  dashboard:  { icon: '📊', label: 'Dashboard' },
  orders:     { icon: '🧾', label: 'Pedidos' },
  kitchen:    { icon: '👨‍🍳', label: 'Cozinha' },
  delivery:   { icon: '🛵', label: 'Entregas' },
  menu:       { icon: '🍕', label: 'Cardápio' },
  users:      { icon: '👥', label: 'Usuários' },
  account:    { icon: '🔑', label: 'Minha Conta' },
};

function buildSidebar() {
  const nav = document.getElementById('sidebar');
  const pages = MENUS[currentUser.role] || [];
  nav.innerHTML = pages.map(p => `
    <button id="nav-${p}" onclick="navigate('${p}')">
      <span>${MENU_ITEMS[p].icon}</span>
      <span class="nav-label">${MENU_ITEMS[p].label}</span>
    </button>
  `).join('');
}

let currentPage = '';
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + page);
  if (btn) btn.classList.add('active');
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  const pages = { dashboard, orders, kitchen, delivery, menu, users, account };
  if (pages[page]) pages[page](main);
}

// ============================================================
// HELPERS
// ============================================================
function nextId(arr) { return arr.length ? Math.max(...arr.map(x => x.id)) + 1 : 1; }
function fmt(v) { return 'R$ ' + Number(v).toFixed(2).replace('.', ','); }
function now() { return new Date().toLocaleString('pt-BR'); }

function statusBadge(s) {
  const map = { pending: ['status-pending','Aguardando'], making: ['status-making','Preparando'],
    delivery: ['status-delivery','Em entrega'], done: ['status-done','Entregue'] };
  const [cls, lbl] = map[s] || ['',''];
  return `<span class="status ${cls}">${lbl}</span>`;
}

function showAlert(id, type, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

// ============================================================
// PAGES
// ============================================================

// --- DASHBOARD ---
function dashboard(el) {
  const orders = getData('pp_orders', []);
  const today = new Date().toLocaleDateString('pt-BR');
  const todayOrders = orders.filter(o => o.date && o.date.startsWith(today.split('/').reverse().join('-')) || o.createdAt && o.createdAt.includes(today));
  const total = todayOrders.reduce((s, o) => s + (o.total || 0), 0);
  const pending = orders.filter(o => o.status === 'pending').length;
  const making = orders.filter(o => o.status === 'making').length;
  const delivery = orders.filter(o => o.status === 'delivery').length;

  el.innerHTML = `
    <h2>📊 Dashboard</h2>
    <div class="cards">
      <div class="card"><div class="num">${orders.length}</div><div class="label">Total de Pedidos</div></div>
      <div class="card"><div class="num">${pending}</div><div class="label">Aguardando</div></div>
      <div class="card"><div class="num">${making}</div><div class="label">Na Cozinha</div></div>
      <div class="card"><div class="num">${delivery}</div><div class="label">Em Entrega</div></div>
    </div>
    <div class="cards">
      <div class="card"><div class="num">${fmt(total)}</div><div class="label">Faturamento do Dia</div></div>
      <div class="card"><div class="num">${getData('pp_users',[]).filter(u=>u.active).length}</div><div class="label">Funcionários Ativos</div></div>
      <div class="card"><div class="num">${getData('pp_menu',[]).filter(m=>m.active).length}</div><div class="label">Itens no Cardápio</div></div>
    </div>
  `;
}

// --- ORDERS ---
function orders(el) {
  const allOrders = getData('pp_orders', []);
  const menuItems = getData('pp_menu', []).filter(m => m.active);

  el.innerHTML = `
    <div class="section-header">
      <h2>🧾 Pedidos</h2>
      ${currentUser.role !== 'entregador' ? `<button class="btn btn-red" onclick="openNewOrder()">+ Novo Pedido</button>` : ''}
    </div>
    <div id="orders-alert" class="alert"></div>
    <table>
      <thead><tr><th>#</th><th>Cliente</th><th>Itens</th><th>Total</th><th>Status</th><th>Criado em</th><th>Ações</th></tr></thead>
      <tbody>
        ${allOrders.length === 0 ? `<tr><td colspan="7" style="text-align:center;color:#888">Nenhum pedido ainda</td></tr>` :
          [...allOrders].reverse().map(o => `
            <tr>
              <td>#${o.id}</td>
              <td>${o.client}</td>
              <td>${o.items.map(i => `${i.qty}x ${i.name}`).join(', ')}</td>
              <td>${fmt(o.total)}</td>
              <td>${statusBadge(o.status)}</td>
              <td>${o.createdAt}</td>
              <td class="actions">
                ${canAdvance(o.status) ? `<button class="btn btn-blue btn-sm" onclick="advanceOrder(${o.id})">Avançar</button>` : ''}
                ${currentUser.role === 'admin' || currentUser.role === 'gerente' ? `<button class="btn btn-gray btn-sm" onclick="deleteOrder(${o.id})">🗑</button>` : ''}
              </td>
            </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function canAdvance(status) {
  if (status === 'done') return false;
  if (currentUser.role === 'cozinha' && status !== 'pending') return false;
  if (currentUser.role === 'entregador' && status !== 'making') return false;
  return true;
}

let orderCart = [];
function openNewOrder() {
  orderCart = [];
  const menuItems = getData('pp_menu', []).filter(m => m.active);
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'order-modal';
  modal.innerHTML = `
    <div class="modal">
      <h3>Novo Pedido</h3>
      <div class="form-row"><label>Nome do Cliente</label><input id="order-client" type="text" placeholder="Ex: João Silva"></div>
      <div class="form-row"><label>Endereço de Entrega</label><input id="order-addr" type="text" placeholder="Rua, número..."></div>
      <div class="form-row">
        <label>Adicionar Item</label>
        <div style="display:flex;gap:8px">
          <select id="order-item" style="flex:1">
            ${menuItems.map(m => `<option value="${m.id}">${m.name} — ${fmt(m.price)}</option>`).join('')}
          </select>
          <input id="order-qty" type="number" value="1" min="1" style="width:60px">
          <button class="btn btn-red btn-sm" onclick="addToCart()">+</button>
        </div>
      </div>
      <div id="cart-list" style="margin-bottom:16px;font-size:14px;color:#ccc;min-height:40px"></div>
      <div style="font-size:15px;font-weight:600;color:#fff;margin-bottom:16px" id="cart-total">Total: R$ 0,00</div>
      <div class="modal-footer">
        <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-red" onclick="submitOrder()">Confirmar Pedido</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function addToCart() {
  const menuItems = getData('pp_menu', []);
  const id = parseInt(document.getElementById('order-item').value);
  const qty = parseInt(document.getElementById('order-qty').value) || 1;
  const item = menuItems.find(m => m.id === id);
  if (!item) return;
  const existing = orderCart.find(c => c.id === id);
  if (existing) existing.qty += qty;
  else orderCart.push({ id: item.id, name: item.name, price: item.price, qty });
  renderCart();
}

function renderCart() {
  const list = document.getElementById('cart-list');
  const totalEl = document.getElementById('cart-total');
  if (!list) return;
  list.innerHTML = orderCart.map((c, i) =>
    `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #2a3a5e">
      <span>${c.qty}x ${c.name}</span>
      <span>${fmt(c.price * c.qty)} <button onclick="removeCart(${i})" style="background:none;border:none;color:#e74c3c;cursor:pointer;margin-left:8px">✕</button></span>
    </div>`
  ).join('');
  const total = orderCart.reduce((s, c) => s + c.price * c.qty, 0);
  totalEl.textContent = 'Total: ' + fmt(total);
}

function removeCart(i) { orderCart.splice(i, 1); renderCart(); }

function submitOrder() {
  const client = document.getElementById('order-client').value.trim();
  const addr = document.getElementById('order-addr').value.trim();
  if (!client) { alert('Informe o nome do cliente'); return; }
  if (orderCart.length === 0) { alert('Adicione pelo menos um item'); return; }
  const orders = getData('pp_orders', []);
  const total = orderCart.reduce((s, c) => s + c.price * c.qty, 0);
  orders.push({ id: nextId(orders), client, address: addr, items: orderCart, total, status: 'pending', createdAt: now(), createdBy: currentUser.username });
  setData('pp_orders', orders);
  closeModal();
  navigate('orders');
}

function advanceOrder(id) {
  const orders = getData('pp_orders', []);
  const o = orders.find(x => x.id === id);
  if (!o) return;
  const flow = ['pending', 'making', 'delivery', 'done'];
  const idx = flow.indexOf(o.status);
  if (idx < flow.length - 1) o.status = flow[idx + 1];
  setData('pp_orders', orders);
  navigate(currentPage);
}

function deleteOrder(id) {
  if (!confirm('Excluir este pedido?')) return;
  setData('pp_orders', getData('pp_orders', []).filter(o => o.id !== id));
  navigate('orders');
}

// --- KITCHEN ---
function kitchen(el) {
  const allOrders = getData('pp_orders', []).filter(o => o.status === 'pending' || o.status === 'making');
  el.innerHTML = `
    <div class="section-header"><h2>👨‍🍳 Cozinha</h2><button class="btn btn-blue btn-sm" onclick="navigate('kitchen')">↻ Atualizar</button></div>
    <div class="kitchen-grid">
      ${allOrders.length === 0 ? `<p style="color:#888">Nenhum pedido na fila no momento.</p>` :
        allOrders.map(o => `
          <div class="kitchen-card ${o.status === 'making' ? 'making' : ''}">
            <h4>#${o.id} — ${o.client} ${statusBadge(o.status)}</h4>
            <div class="items">${o.items.map(i => `• ${i.qty}x ${i.name}`).join('<br>')}</div>
            <div class="time">⏱ ${o.createdAt}</div>
            ${o.status === 'pending' ? `<button class="btn btn-blue btn-sm" onclick="advanceOrder(${o.id})">Iniciar Preparo</button>` : ''}
            ${o.status === 'making' ? `<button class="btn btn-green btn-sm" onclick="advanceOrder(${o.id})">Pronto p/ Entrega</button>` : ''}
          </div>`).join('')}
    </div>
  `;
}

// --- DELIVERY ---
function delivery(el) {
  const allOrders = getData('pp_orders', []).filter(o => o.status === 'delivery' || o.status === 'done');
  el.innerHTML = `
    <div class="section-header"><h2>🛵 Entregas</h2><button class="btn btn-blue btn-sm" onclick="navigate('delivery')">↻ Atualizar</button></div>
    <div class="delivery-list">
      ${allOrders.length === 0 ? `<p style="color:#888">Nenhuma entrega no momento.</p>` :
        allOrders.map(o => `
          <div class="delivery-card ${o.status === 'done' ? 'done' : ''}">
            <div>
              <strong>#${o.id} — ${o.client}</strong><br>
              <small style="color:#aaa">📍 ${o.address || 'Endereço não informado'}</small><br>
              <small style="color:#888">${o.items.map(i => `${i.qty}x ${i.name}`).join(', ')}</small>
            </div>
            <div style="text-align:right">
              ${statusBadge(o.status)}<br><br>
              ${o.status === 'delivery' ? `<button class="btn btn-green btn-sm" onclick="advanceOrder(${o.id})">Entregue ✓</button>` : ''}
            </div>
          </div>`).join('')}
    </div>
  `;
}

// --- MENU ---
function menu(el) {
  const items = getData('pp_menu', []);
  el.innerHTML = `
    <div class="section-header">
      <h2>🍕 Cardápio</h2>
      <button class="btn btn-red" onclick="openMenuForm()">+ Adicionar Item</button>
    </div>
    <div id="menu-alert" class="alert"></div>
    <table>
      <thead><tr><th>#</th><th>Nome</th><th>Categoria</th><th>Preço</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody>
        ${items.map(m => `
          <tr>
            <td>${m.id}</td><td>${m.name}</td><td>${m.category}</td><td>${fmt(m.price)}</td>
            <td><span class="status ${m.active ? 'status-active' : 'status-inactive'}">${m.active ? 'Ativo' : 'Inativo'}</span></td>
            <td class="actions">
              <button class="btn btn-blue btn-sm" onclick="openMenuForm(${m.id})">Editar</button>
              <button class="btn btn-gray btn-sm" onclick="toggleMenu(${m.id})">${m.active ? 'Desativar' : 'Ativar'}</button>
              <button class="btn btn-red btn-sm" onclick="deleteMenu(${m.id})">🗑</button>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function openMenuForm(id) {
  const items = getData('pp_menu', []);
  const item = id ? items.find(m => m.id === id) : null;
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal">
      <h3>${item ? 'Editar Item' : 'Novo Item'}</h3>
      <div class="form-row"><label>Nome</label><input id="mi-name" value="${item ? item.name : ''}"></div>
      <div class="form-row"><label>Categoria</label>
        <select id="mi-cat">
          <option ${item?.category === 'Pizza' ? 'selected' : ''}>Pizza</option>
          <option ${item?.category === 'Bebida' ? 'selected' : ''}>Bebida</option>
          <option ${item?.category === 'Sobremesa' ? 'selected' : ''}>Sobremesa</option>
          <option ${item?.category === 'Outro' ? 'selected' : ''}>Outro</option>
        </select>
      </div>
      <div class="form-row"><label>Preço (R$)</label><input id="mi-price" type="number" step="0.01" value="${item ? item.price : ''}"></div>
      <div class="modal-footer">
        <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-red" onclick="saveMenu(${id || 'null'})">Salvar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function saveMenu(id) {
  const name = document.getElementById('mi-name').value.trim();
  const category = document.getElementById('mi-cat').value;
  const price = parseFloat(document.getElementById('mi-price').value);
  if (!name || isNaN(price)) { alert('Preencha todos os campos'); return; }
  const items = getData('pp_menu', []);
  if (id) {
    const m = items.find(x => x.id === id);
    if (m) { m.name = name; m.category = category; m.price = price; }
  } else {
    items.push({ id: nextId(items), name, category, price, active: true });
  }
  setData('pp_menu', items);
  closeModal();
  navigate('menu');
}

function toggleMenu(id) {
  const items = getData('pp_menu', []);
  const m = items.find(x => x.id === id);
  if (m) m.active = !m.active;
  setData('pp_menu', items);
  navigate('menu');
}

function deleteMenu(id) {
  if (!confirm('Excluir este item do cardápio?')) return;
  setData('pp_menu', getData('pp_menu', []).filter(m => m.id !== id));
  navigate('menu');
}

// --- USERS ---
function users(el) {
  const allUsers = getData('pp_users', []);
  el.innerHTML = `
    <div class="section-header">
      <h2>👥 Usuários</h2>
      <button class="btn btn-red" onclick="openUserForm()">+ Novo Usuário</button>
    </div>
    <div id="users-alert" class="alert"></div>
    <table>
      <thead><tr><th>#</th><th>Nome</th><th>Usuário</th><th>Cargo</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody>
        ${allUsers.map(u => `
          <tr>
            <td>${u.id}</td><td>${u.name}</td><td>${u.username}</td>
            <td>${roleLabel(u.role)}</td>
            <td><span class="status ${u.active ? 'status-active' : 'status-inactive'}">${u.active ? 'Ativo' : 'Inativo'}</span></td>
            <td class="actions">
              <button class="btn btn-blue btn-sm" onclick="openUserForm(${u.id})">Editar</button>
              ${u.id !== currentUser.id ? `<button class="btn btn-gray btn-sm" onclick="toggleUser(${u.id})">${u.active ? 'Desativar' : 'Ativar'}</button>` : ''}
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function openUserForm(id) {
  const allUsers = getData('pp_users', []);
  const u = id ? allUsers.find(x => x.id === id) : null;
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal">
      <h3>${u ? 'Editar Usuário' : 'Novo Usuário'}</h3>
      <div class="form-row"><label>Nome completo</label><input id="u-name" value="${u ? u.name : ''}"></div>
      <div class="form-row"><label>Usuário (login)</label><input id="u-user" value="${u ? u.username : ''}"></div>
      <div class="form-row"><label>Senha ${u ? '(deixe em branco para não alterar)' : ''}</label><input id="u-pass" type="password"></div>
      <div class="form-row"><label>Cargo</label>
        <select id="u-role">
          <option value="admin" ${u?.role==='admin'?'selected':''}>Admin</option>
          <option value="gerente" ${u?.role==='gerente'?'selected':''}>Gerente</option>
          <option value="caixa" ${u?.role==='caixa'?'selected':''}>Caixa</option>
          <option value="entregador" ${u?.role==='entregador'?'selected':''}>Entregador</option>
          <option value="cozinha" ${u?.role==='cozinha'?'selected':''}>Cozinha</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-red" onclick="saveUser(${id || 'null'})">Salvar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function saveUser(id) {
  const name = document.getElementById('u-name').value.trim();
  const username = document.getElementById('u-user').value.trim();
  const pass = document.getElementById('u-pass').value;
  const role = document.getElementById('u-role').value;
  if (!name || !username) { alert('Preencha nome e usuário'); return; }
  const allUsers = getData('pp_users', []);
  if (id) {
    const u = allUsers.find(x => x.id === id);
    if (u) { u.name = name; u.username = username; u.role = role; if (pass) u.password = pass; }
  } else {
    if (!pass) { alert('Informe a senha'); return; }
    if (allUsers.find(u => u.username === username)) { alert('Usuário já existe'); return; }
    allUsers.push({ id: nextId(allUsers), name, username, password: pass, role, active: true });
  }
  setData('pp_users', allUsers);
  closeModal();
  navigate('users');
}

function toggleUser(id) {
  const allUsers = getData('pp_users', []);
  const u = allUsers.find(x => x.id === id);
  if (u) u.active = !u.active;
  setData('pp_users', allUsers);
  navigate('users');
}

// --- ACCOUNT ---
function account(el) {
  el.innerHTML = `
    <h2>🔑 Minha Conta</h2>
    <div class="account-box">
      <div class="form-row"><label>Nome</label><input id="acc-name" value="${currentUser.name}"></div>
      <div class="form-row"><label>Usuário</label><input value="${currentUser.username}" disabled style="opacity:.5"></div>
      <div class="form-row"><label>Cargo</label><input value="${roleLabel(currentUser.role)}" disabled style="opacity:.5"></div>
      <div class="form-row"><label>Nova Senha (deixe em branco para manter)</label><input id="acc-pass" type="password"></div>
      <div class="form-row"><label>Confirmar Nova Senha</label><input id="acc-pass2" type="password"></div>
      <div id="acc-alert" class="alert"></div>
      <button class="btn btn-red" onclick="saveAccount()">Salvar Alterações</button>
    </div>
  `;
}

function saveAccount() {
  const name = document.getElementById('acc-name').value.trim();
  const pass = document.getElementById('acc-pass').value;
  const pass2 = document.getElementById('acc-pass2').value;
  if (!name) { showAlert('acc-alert','error','Informe o nome'); return; }
  if (pass && pass !== pass2) { showAlert('acc-alert','error','As senhas não coincidem'); return; }
  const allUsers = getData('pp_users', []);
  const u = allUsers.find(x => x.id === currentUser.id);
  if (u) { u.name = name; if (pass) u.password = pass; }
  setData('pp_users', allUsers);
  currentUser.name = name;
  document.getElementById('header-name').textContent = name;
  showAlert('acc-alert','success','Dados atualizados com sucesso!');
}

function closeModal() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
}

// ============================================================
// INIT
// ============================================================
initData();
</script>
</body>
</html>
